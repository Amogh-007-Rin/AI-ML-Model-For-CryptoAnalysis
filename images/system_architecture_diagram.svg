<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1FA2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9C27B0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C2185B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E91E63;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="#FAFAFA" rx="10"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333">Cryptocurrency Market Direction Prediction — System Architecture</text>

  <!-- === LAYER 1: DATA LAYER === -->
  <text x="30" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#777">DATA LAYER</text>
  <line x1="30" y1="90" x2="970" y2="90" stroke="#ddd" stroke-width="1"/>

  <rect x="80" y="100" width="380" height="65" rx="8" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="270" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Raw Dataset</text>
  <text x="270" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E3F2FD">crypto_sentiment_prediction_dataset.csv</text>
  <text x="270" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E3F2FD">2,063 Rows × 14 Columns</text>

  <line x1="460" y1="132" x2="530" y2="132" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="540" y="100" width="380" height="65" rx="8" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="730" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Pre-processed Dataset</text>
  <text x="730" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E3F2FD">pre-processed-crypto-dataset.csv</text>
  <text x="730" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E3F2FD">Cleaned &amp; Encoded (23 Columns)</text>

  <!-- === LAYER 2: PREPROCESSING === -->
  <text x="30" y="205" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#777">PREPROCESSING PIPELINE</text>
  <line x1="30" y1="210" x2="970" y2="210" stroke="#ddd" stroke-width="1"/>

  <!-- Arrow down from data layer -->
  <line x1="730" y1="165" x2="730" y2="225" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="50" y="230" width="200" height="70" rx="8" fill="url(#orange)" filter="url(#shadow)"/>
  <text x="150" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Exploratory Data Analysis</text>
  <text x="150" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFF3E0">Correlation Heatmap</text>
  <text x="150" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFF3E0">Price/Volume/Sentiment Plots</text>

  <rect x="290" y="230" width="200" height="70" rx="8" fill="#1976D2" filter="url(#shadow)"/>
  <text x="390" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Data Cleaning</text>
  <text x="390" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E3F2FD">Type Conversion (datetime)</text>
  <text x="390" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E3F2FD">Missing Value Imputation</text>

  <rect x="530" y="230" width="200" height="70" rx="8" fill="#1976D2" filter="url(#shadow)"/>
  <text x="630" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Feature Engineering</text>
  <text x="630" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E3F2FD">One-Hot Encoding</text>
  <text x="630" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E3F2FD">(10 Cryptocurrencies)</text>

  <rect x="770" y="230" width="180" height="70" rx="8" fill="#1976D2" filter="url(#shadow)"/>
  <text x="860" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Feature Scaling</text>
  <text x="860" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E3F2FD">StandardScaler</text>
  <text x="860" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E3F2FD">Mean=0, Std=1</text>

  <!-- Arrows between preprocessing stages -->
  <line x1="490" y1="265" x2="530" y2="265" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="730" y1="265" x2="770" y2="265" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- === LAYER 3: MODEL TRAINING === -->
  <text x="30" y="345" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#777">MODEL TRAINING</text>
  <line x1="30" y1="350" x2="970" y2="350" stroke="#ddd" stroke-width="1"/>

  <line x1="390" y1="300" x2="390" y2="365" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="80" y="370" width="260" height="55" rx="8" fill="url(#purple)" filter="url(#shadow)"/>
  <text x="210" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Train-Test Split</text>
  <text x="210" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E1BEE7">80% Train / 20% Test (Stratified)</text>

  <line x1="210" y1="370" x2="210" y2="370" stroke="#555" stroke-width="2"/>
  <line x1="210" y1="425" x2="210" y2="440" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="80" y="445" width="260" height="75" rx="8" fill="url(#pink)" filter="url(#shadow)"/>
  <text x="210" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Baseline Models</text>
  <text x="210" y="483" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FCE4EC">Logistic Regression: 49.6%</text>
  <text x="210" y="497" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FCE4EC">Random Forest: 49.1%</text>
  <text x="210" y="511" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FCE4EC">XGBoost: 46.5% | SVM: 45.8%</text>

  <!-- Arrow right to tuning -->
  <line x1="340" y1="482" x2="390" y2="482" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="395" y="445" width="260" height="75" rx="8" fill="url(#pink)" filter="url(#shadow)"/>
  <text x="525" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Hyperparameter Tuning</text>
  <text x="525" y="483" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FCE4EC">GridSearchCV</text>
  <text x="525" y="497" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FCE4EC">3-Fold Cross-Validation</text>
  <text x="525" y="511" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FCE4EC">Best Parameters Selected</text>

  <line x1="655" y1="482" x2="700" y2="482" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="705" y="445" width="240" height="75" rx="8" fill="url(#green)" filter="url(#shadow)"/>
  <text x="825" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Tuned Models</text>
  <text x="825" y="483" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E8F5E9">Random Forest: 52.1% (+3.0%)</text>
  <text x="825" y="497" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E8F5E9">XGBoost: 51.8% (+5.3%)</text>
  <text x="825" y="511" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E8F5E9">SVM: 50.6% | LogReg: 50.1%</text>

  <!-- === LAYER 4: EVALUATION === -->
  <text x="30" y="565" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#777">EVALUATION &amp; RESULTS</text>
  <line x1="30" y1="570" x2="970" y2="570" stroke="#ddd" stroke-width="1"/>

  <line x1="525" y1="520" x2="525" y2="585" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="200" y="590" width="600" height="65" rx="10" fill="url(#green)" filter="url(#shadow)"/>
  <text x="500" y="613" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff">Best Model: Random Forest (Accuracy: 52.1%)</text>
  <text x="500" y="633" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8F5E9">Hyperparameters: max_depth=10, n_estimators=100, min_samples_split=5</text>
  <text x="500" y="648" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8F5E9">Confusion Matrix &amp; Classification Report Generated</text>

  <!-- Legend -->
  <rect x="30" y="670" width="12" height="12" fill="url(#blue)" rx="2"/>
  <text x="48" y="680" font-family="Arial, sans-serif" font-size="10" fill="#555">Data</text>
  <rect x="110" y="670" width="12" height="12" fill="url(#orange)" rx="2"/>
  <text x="128" y="680" font-family="Arial, sans-serif" font-size="10" fill="#555">EDA</text>
  <rect x="180" y="670" width="12" height="12" fill="url(#purple)" rx="2"/>
  <text x="198" y="680" font-family="Arial, sans-serif" font-size="10" fill="#555">Training</text>
  <rect x="270" y="670" width="12" height="12" fill="url(#pink)" rx="2"/>
  <text x="288" y="680" font-family="Arial, sans-serif" font-size="10" fill="#555">Models</text>
  <rect x="360" y="670" width="12" height="12" fill="url(#green)" rx="2"/>
  <text x="378" y="680" font-family="Arial, sans-serif" font-size="10" fill="#555">Best Result</text>
</svg>
